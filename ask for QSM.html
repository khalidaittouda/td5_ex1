<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Quiz Interactif</title>
</head>
<body>
    <h1>Quiz Interactif</h1>
    <button onclick="lancerQuiz()">Démarrer le Quiz</button>

    <script>
        const QUESTIONS = [
            ["Quelle est la capitale de la France ?", "Paris"],
            ["Combien font 5 x 6 ?", "30"],
            ["Quel est le langage du web côté client ?", "JavaScript"],
            ["Combien de jours dans une semaine ?", "7"],
            ["Quelle est la capitale du Maroc ?", "Rabat"]
        ];

        function lancerQuiz() {
            let score = 0;

            for (let i = 0; i < QUESTIONS.length; i++) {
                let question = QUESTIONS[i][0];
                let bonneReponse = QUESTIONS[i][1];

                let reponseUtilisateur = prompt(question);

                if (reponseUtilisateur === bonneReponse) {
                    alert("Réponse juste !");
                    score++;
                } else {
                    alert("Réponse fausse !");
                }
            }

            alert("Vous avez répondu correctement à " + score + " questions sur " + QUESTIONS.length);
        }
    </script>
</body>
</html>
